script: |
            echo "Checking host: ${{ secrets.EC2_HOST }}"
            cd ~/my-app
            if [ ! -d ".git" ]; then
              git clone https://github.com/harshithabg333/Streamlit-Python.git .
            else
              git pull origin main
            fi
            pip install -r requirements.txt
            pkill -f streamlit || true
            nohup streamlit run form_app_2.py --server.port 8501 &