name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Successfully connected!"
            cd ~/my-app
            if [ ! -d ".git" ]; then
              git clone https://github.com/harshithabg333/Streamlit-Python.git .
            else
              git pull origin main
            fi

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install -r requirements.txt

            fuser -k 8501/tcp || true
            sleep 2
            nohup venv/bin/streamlit run form_app.py --server.port 8501 > streamlit.log 2>&1 < /dev/null &
            disown
            echo "Deploy script finished"